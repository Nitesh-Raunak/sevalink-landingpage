<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <!-- Background oval -->
  <ellipse cx="400" cy="520" rx="340" ry="40" fill="#FEE2E2" opacity="0.6"/>

  <!-- Road -->
  <rect x="60" y="480" width="680" height="24" rx="12" fill="#E5E7EB"/>
  <rect x="180" y="489" width="40" height="6" rx="3" fill="#fff"/>
  <rect x="280" y="489" width="40" height="6" rx="3" fill="#fff"/>
  <rect x="380" y="489" width="40" height="6" rx="3" fill="#fff"/>
  <rect x="480" y="489" width="40" height="6" rx="3" fill="#fff"/>
  <rect x="580" y="489" width="40" height="6" rx="3" fill="#fff"/>

  <!-- Ambulance body -->
  <rect x="180" y="320" width="400" height="160" rx="16" fill="#FFFFFF" stroke="#DC2626" stroke-width="3"/>

  <!-- Ambulance cabin -->
  <path d="M580 380 L660 380 C680 380 690 390 695 410 L700 440 C700 455 690 465 675 465 L580 465 Z" fill="#FFFFFF" stroke="#DC2626" stroke-width="3"/>

  <!-- Windshield -->
  <path d="M590 390 L640 390 C655 390 665 398 668 410 L672 435 L590 435 Z" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1.5"/>

  <!-- Red stripe on ambulance -->
  <rect x="195" y="380" width="385" height="40" fill="#DC2626" opacity="0.9"/>

  <!-- Cross symbol -->
  <rect x="340" y="335" width="80" height="80" rx="8" fill="#DC2626"/>
  <rect x="365" y="345" width="30" height="60" rx="4" fill="#FFFFFF"/>
  <rect x="350" y="360" width="60" height="30" rx="4" fill="#FFFFFF"/>

  <!-- AMBULANCE text -->
  <text x="380" y="410" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF" letter-spacing="4">AMBULANCE</text>

  <!-- Siren -->
  <rect x="350" y="300" width="60" height="24" rx="12" fill="#DC2626"/>
  <circle cx="370" cy="312" r="6" fill="#EF4444">
    <animate attributeName="opacity" values="1;0.3;1" dur="0.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="390" cy="312" r="6" fill="#3B82F6">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="0.8s" repeatCount="indefinite"/>
  </circle>

  <!-- Siren waves -->
  <path d="M340 290 C340 270 360 260 380 260 C400 260 420 270 420 290" stroke="#EF4444" stroke-width="2" fill="none" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0;0.4" dur="1.2s" repeatCount="indefinite"/>
  </path>
  <path d="M330 280 C330 255 355 240 380 240 C405 240 430 255 430 280" stroke="#EF4444" stroke-width="2" fill="none" opacity="0.25">
    <animate attributeName="opacity" values="0.25;0;0.25" dur="1.2s" begin="0.3s" repeatCount="indefinite"/>
  </path>

  <!-- Front wheel -->
  <circle cx="280" cy="485" r="36" fill="#1F2937" stroke="#374151" stroke-width="3"/>
  <circle cx="280" cy="485" r="18" fill="#6B7280"/>
  <circle cx="280" cy="485" r="6" fill="#9CA3AF"/>

  <!-- Rear wheel -->
  <circle cx="520" cy="485" r="36" fill="#1F2937" stroke="#374151" stroke-width="3"/>
  <circle cx="520" cy="485" r="18" fill="#6B7280"/>
  <circle cx="520" cy="485" r="6" fill="#9CA3AF"/>

  <!-- Headlight -->
  <rect x="695" y="420" width="16" height="22" rx="4" fill="#FCD34D"/>

  <!-- Location pin (floating) -->
  <g transform="translate(650, 200)">
    <path d="M30 0 C13.4 0 0 13.4 0 30 C0 52.5 30 75 30 75 C30 75 60 52.5 60 30 C60 13.4 46.6 0 30 0Z" fill="#DC2626" opacity="0.9">
      <animate attributeName="transform" values="translate(0,0);translate(0,-8);translate(0,0)" dur="2s" repeatCount="indefinite"/>
    </path>
    <circle cx="30" cy="28" r="12" fill="#FFFFFF">
      <animate attributeName="transform" values="translate(0,0);translate(0,-8);translate(0,0)" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Heart rate line -->
  <polyline points="80,240 120,240 140,240 155,200 170,280 185,220 200,260 215,240 300,240" stroke="#DC2626" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.3">
    <animate attributeName="stroke-dashoffset" from="500" to="0" dur="2s" repeatCount="indefinite"/>
  </polyline>
  <polyline points="80,240 120,240 140,240 155,200 170,280 185,220 200,260 215,240 300,240" stroke="#DC2626" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.3" stroke-dasharray="10 500">
    <animate attributeName="stroke-dashoffset" from="500" to="0" dur="2s" repeatCount="indefinite"/>
  </polyline>

  <!-- Speed lines -->
  <line x1="100" y1="380" x2="160" y2="380" stroke="#DC2626" stroke-width="2" opacity="0.2" stroke-linecap="round"/>
  <line x1="80" y1="400" x2="160" y2="400" stroke="#DC2626" stroke-width="2" opacity="0.3" stroke-linecap="round"/>
  <line x1="110" y1="420" x2="160" y2="420" stroke="#DC2626" stroke-width="2" opacity="0.2" stroke-linecap="round"/>
</svg>
